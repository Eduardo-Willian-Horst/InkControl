services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: inkcontrol
      POSTGRES_USER: inkcontrol
      POSTGRES_PASSWORD: inkcontrol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkcontrol -d inkcontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
